      </path>
    </g>

    <!-- Wave 3: slowest/back layer, period 640, amplitude 12 -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-1.6; 0,0; 0,1.6; 0,0" keyTimes="0;0.25;0.5;0.75;1"
