      <path d="M -640.00,238.00 C -551.68,238.00 -568.32,226.00 -480.00,226.00 C -391.68,226.00 -408.32,238.00 -320.00,238.00 C -231.68,238.00 -248.32,250.00 -160.00,250.00 C -71.68,250.00 -88.32,238.00 0.00,238.00 C 88.32,238.00 71.68,226.00 160.00,226.00 C 248.32,226.00 231.68,238.00 320.00,238.00 C 408.32,238.00 391.68,250.00 480.00,250.00 C 568.32,250.00 551.68,238.00 640.00,238.00 C 728.32,238.00 711.68,226.00 800.00,226.00 C 888.32,226.00 871.68,238.00 960.00,238.00 C 1048.32,238.00 1031.68,250.00 1120.00,250.00 C 1208.32,250.00 1191.68,238.00 1280.00,238.00 C 1368.32,238.00 1351.68,226.00 1440.00,226.00 C 1528.32,226.00 1511.68,238.00 1600.00,238.00 C 1688.32,238.00 1671.68,250.00 1760.00,250.00 C 1848.32,250.00 1831.68,238.00 1920.00,238.00 C 2008.32,238.00 1991.68,226.00 2080.00,226.00 C 2168.32,226.00 2151.68,238.00 2240.00,238.00 C 2328.32,238.00 2311.68,250.00 2400.00,250.00 C 2488.32,250.00 2471.68,238.00 2560.00,238.00"
