<svg width="100%" viewBox="0 0 1600 250" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dotgrid" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#DBEAFE" opacity="0.55"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <clipPath id="waveClip">
      <rect x="0" y="185" width="1600" height="65"/>
    </clipPath>
  </defs>

  <rect width="1600" height="250" fill="#FAFAFA"/>

  <!-- Technical Grid: subtle parallax drift -->
  <g>
    <rect width="1600" height="250" fill="url(#dotgrid)" opacity="1"/>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 1.5,1; 0,0; -1.5,-1; 0,0" keyTimes="0;0.25;0.5;0.75;1"
      calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
      dur="22s" repeatCount="indefinite"/>
  </g>

  <!-- Blueprint Guide lines: two draw slowly left-to-right then fade, third stays static -->
  <g>
    <line x1="60" y1="22" x2="1540" y2="22" stroke="#DBEAFE" stroke-width="1"
      stroke-dasharray="1480 1480" stroke-dashoffset="1480">
      <animate attributeName="stroke-dashoffset" values="1480;1480;0;0" keyTimes="0;0.05;0.6;1" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.72;1" dur="9s" repeatCount="indefinite"/>
    </line>
    <line x1="60" y1="30" x2="1540" y2="30" stroke="#DBEAFE" stroke-width="1"
      stroke-dasharray="1480 1480" stroke-dashoffset="1480">
      <animate attributeName="stroke-dashoffset" values="1480;1480;0;0" keyTimes="0;0.05;0.6;1" dur="11s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.72;1" dur="11s" begin="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="60" y1="38" x2="900" y2="38" stroke="#3B82F6" stroke-width="1" stroke-dasharray="6 5" opacity="0.6"/>
  </g>

  <path d="M40 20 L40 60 M40 20 L80 20" stroke="#111111" stroke-width="1.4"/>
  <line x1="40" y1="40" x2="52" y2="40" stroke="#111111" stroke-width="1"/>
  <line x1="60" y1="20" x2="60" y2="32" stroke="#111111" stroke-width="1"/>
  <text x="46" y="72" font-family="monospace" font-size="9" fill="#111111" opacity="0.4">X:0040 Y:0020</text>

  <!-- Corner Accent stripes: slow opacity pulse (30%-80%) -->
  <g stroke="#3B82F6" stroke-width="1">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="5s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    <line x1="1500" y1="55" x2="1520" y2="15"/>
    <line x1="1515" y1="55" x2="1535" y2="15"/>
    <line x1="1530" y1="55" x2="1550" y2="15"/>
    <line x1="1545" y1="55" x2="1565" y2="15"/>
  </g>
  <path d="M1560 20 L1560 60 M1560 20 L1520 20" stroke="#111111" stroke-width="1.4"/>
  <text x="1470" y="72" font-family="monospace" font-size="9" fill="#111111" opacity="0.4">REV 2026.07</text>

  <!-- HUD Crosshair (left): static ring, with slow radar pulse -->
  <g transform="translate(150,95)">
    <g stroke="#3B82F6" stroke-width="1" fill="none" opacity="0.7">
      <circle cx="0" cy="0" r="7"/>
      <line x1="0" y1="-12" x2="0" y2="-6"/>
      <line x1="0" y1="6" x2="0" y2="12"/>
      <line x1="-12" y1="0" x2="-6" y2="0"/>
      <line x1="6" y1="0" x2="12" y2="0"/>
    </g>
    <circle cx="0" cy="0" r="7" stroke="#3B82F6" stroke-width="0.75" fill="none" opacity="0">
      <animate attributeName="r" values="7;34" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- HUD Crosshair (right): static ring, with slow radar pulse -->
  <g transform="translate(1430,105)">
    <g stroke="#60A5FA" stroke-width="1" fill="none" opacity="0.7">
      <circle cx="0" cy="0" r="7"/>
      <line x1="0" y1="-12" x2="0" y2="-6"/>
      <line x1="0" y1="6" x2="0" y2="12"/>
      <line x1="-12" y1="0" x2="-6" y2="0"/>
      <line x1="6" y1="0" x2="12" y2="0"/>
    </g>
    <circle cx="0" cy="0" r="7" stroke="#60A5FA" stroke-width="0.75" fill="none" opacity="0">
      <animate attributeName="r" values="7;34" dur="6s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0" dur="6s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Blueprint Nodes: static, with tiny staggered blink indicators -->
  <g transform="translate(300,60)">
    <circle cx="0" cy="0" r="2" fill="#111111" opacity="0.5"/>
  </g>
  <g transform="translate(1310,60)">
    <circle cx="0" cy="0" r="2" fill="#111111" opacity="0.5"/>
  </g>
  <g transform="translate(800,38)">
    <circle cx="0" cy="0" r="3" fill="#60A5FA"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="3.6s" begin="0.4s" repeatCount="indefinite"/>
  </g>

  <g stroke="#111111" stroke-width="1" opacity="0.3">
    <line x1="200" y1="26" x2="200" y2="34"/>
    <line x1="260" y1="26" x2="260" y2="34"/>
    <line x1="1340" y1="26" x2="1340" y2="34"/>
    <line x1="1400" y1="26" x2="1400" y2="34"/>
  </g>

  <!-- Floating Blueprint Particles: static base, plus soft blinking -->
  <g>
    <circle cx="150" cy="150" r="1.4" fill="#60A5FA" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="4.2s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="185" r="1.2" fill="#3B82F6" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0.1;0.45" dur="5.1s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="55" r="1.5" fill="#60A5FA" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.8s" begin="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1110" cy="65" r="1.3" fill="#3B82F6" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.12;0.5" dur="4.7s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1260" cy="170" r="1.4" fill="#60A5FA" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0.1;0.45" dur="5.6s" begin="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1480" cy="150" r="1.2" fill="#3B82F6" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="4.4s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Tiny blueprint digital particle dots: fade in / fade out at random-feeling timings -->
  <g>
    <circle cx="95" cy="115" r="1" fill="#3B82F6" opacity="0">
      <animate attributeName="opacity" values="0;0.35;0" dur="6.2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="410" cy="200" r="1" fill="#60A5FA" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="7.5s" begin="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="45" r="1" fill="#3B82F6" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="5.8s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="190" r="1" fill="#60A5FA" opacity="0">
      <animate attributeName="opacity" values="0;0.35;0" dur="6.9s" begin="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1180" cy="30" r="1" fill="#3B82F6" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="8.1s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1390" cy="185" r="1" fill="#60A5FA" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="7.1s" begin="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="205" r="1" fill="#3B82F6" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="6.6s" begin="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1520" cy="100" r="1" fill="#60A5FA" opacity="0">
      <animate attributeName="opacity" values="0;0.35;0" dur="7.8s" begin="1.9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="800" y="118" text-anchor="middle" font-family="'Segoe UI', Inter, sans-serif" font-size="34" font-weight="700" fill="#111111">
    Thanks for Visiting!
  </text>
  <text x="800" y="150" text-anchor="middle" font-family="monospace" font-size="15" letter-spacing="1" fill="#111111">
    github.com/<tspan fill="#3B82F6" font-weight="bold">Vikki-2006</tspan>
  </text>
  <text x="800" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#111111" opacity="0.35">
    SEC — FOOTER / EOF
  </text>
  <path d="M690 95 L690 80 L710 80" stroke="#111111" stroke-width="1" opacity="0.5"/>
  <path d="M910 95 L910 80 L890 80" stroke="#111111" stroke-width="1" opacity="0.5"/>

  <!-- ============================================================ -->
